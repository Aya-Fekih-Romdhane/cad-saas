name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────
  # Backend Tests
  # ─────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cadsaas_test
          POSTGRES_USER: cadsaas
          POSTGRES_PASSWORD: cadsaas_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Backend Tests
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: cadsaas_test
          DB_USER: cadsaas
          DB_PASSWORD: cadsaas_test
          REDIS_HOST: localhost
          JWT_SECRET: test-secret-key-for-ci-only
          CLAUDE_API_KEY: dummy-for-tests
        run: mvn test -q

      - name: Build Backend
        working-directory: ./backend
        run: mvn package -DskipTests -q

  # ─────────────────────────────────────────────
  # Frontend Tests & Build
  # ─────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build:prod

  # ─────────────────────────────────────────────
  # Python CAD Service Tests
  # ─────────────────────────────────────────────
  cad-service-test:
    name: CAD Service Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Dependencies
        working-directory: ./cad-service
        run: pip install -r requirements.txt

      - name: Run Tests
        working-directory: ./cad-service
        run: python -m pytest tests/ -v --tb=short || true

