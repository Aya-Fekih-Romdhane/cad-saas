spring:
  application:
    name: cad-saas-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cadsaas}
    username: ${DB_USER:cadsaas}
    password: ${DB_PASSWORD:cadsaas_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      access-token-expiration: 3600000      # 1 hour
      refresh-token-expiration: 604800000   # 7 days
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  storage:
    upload-dir: ${UPLOAD_DIR:./uploads}
    max-file-size-mb: 50
  claude:
    api-key: ${CLAUDE_API_KEY:}
    api-url: https://api.anthropic.com/v1
    model: claude-opus-4-7
    vision-model: claude-opus-4-7
    max-tokens: 4096
    timeout-seconds: 120
    retry-attempts: 3
  cad-service:
    url: ${CAD_SERVICE_URL:http://localhost:8090}
    timeout-seconds: 300
  rate-limit:
    requests-per-minute: 10
    generation-per-day: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    mail:
      enabled: false
    defaults:
      enabled: true

logging:
  level:
    com.cadsaas: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
